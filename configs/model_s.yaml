# XCarDamageNet-S (Small) configuration
img_size: 518
pretrained_backbone: true
unfreeze_backbone_blocks: 0

# Training
optimizer: adamw
lr: 1.0e-4
weight_decay: 0.05
lr_min: 1.0e-6
warmup_epochs: 5
epochs: 150
patience: 30
batch_size: 8
workers: 8
amp: false
save_period: 10

# Augmentation
mosaic: 1.0
mixup: 0.10
copy_paste: 0.30
hflip: 0.5
hue: 0.015
saturation: 0.7
brightness: 0.4

# Loss weights (match spec exactly)
w_box: 7.5
w_cls: 0.5
w_dfl: 1.5
w_attn: 0.10
w_contrast: 0.05
w_physics: 0.02
